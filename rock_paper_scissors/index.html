<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissor game</h1>
    <div id="box">
        <h2>Current Score</h2>
        <div id="scoreContainer">
        <div id="hbox">
            <div>Human Score</div>
            <div id="human" class="scores">0</div>
        </div>
        <div id="cbox">
            <div>Computer Score</div>
            <div id="comp" class="scores">0</div>
        </div>
        </div>
        
    </div>

    <h2>Make a choice!</h2>
    <div id="buttons">
        <button id="0">Rock</button>
        <button id="1">Paper</button>
        <button id="2">Scissor</button>
    </div>
    <h2>Result of your previous choice:</h2>
    <div id="result"></div>
    <div id="final"></div>
    <script src="my.js"></script>
</body>
</html>
